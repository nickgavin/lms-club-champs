<style>
  .lms-container { 
    font-family: Arial, sans-serif; 
    width: 100%; 
    box-sizing: border-box; 
  }
  .lms-controls { 
    margin-bottom: 20px; 
    padding: 15px; 
    background: #eef; 
    border-radius: 5px; 
    border: 1px solid #ccd; 
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
  }
  .lms-controls label { 
    font-weight: bold; 
    font-size: 15px; 
  }
  .lms-controls input[type="number"] { 
    width: 50px; 
    padding: 4px; 
    font-size: 15px; 
    text-align: center; 
    margin-left: 5px;
  }
  .lms-controls input[type="checkbox"] {
    transform: scale(1.3);
    margin-right: 5px;
    cursor: pointer;
  }
  .toggle-group {
    display: flex;
    align-items: center;
    background: #ddf;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid #bbc;
  }
  .toggle-group label {
    font-weight: normal;
    cursor: pointer;
  }
  .lms-table { 
    border-collapse: collapse; 
    width: 100%; 
    margin-bottom: 40px; 
    font-size: 11px; 
    word-wrap: break-word; 
  }
  .lms-table th, .lms-table td { 
    border: 1px solid #ccc; 
    padding: 5px 3px; 
    text-align: center; 
    vertical-align: middle;
  }
  .lms-table th { 
    background-color: #f4f4f4; 
    cursor: pointer; 
    user-select: none; 
    position: sticky; 
    top: 0; 
  }
  .lms-table th:hover { background-color: #ddd; }
  .lms-table tr:hover { background-color: #fdfdfd; }
  .name-col { 
    text-align: left !important; 
    font-weight: bold; 
    min-width: 80px; 
  }
  .highlight { 
    font-weight: bold; 
    background-color: #fff9e6; 
  }
  .time-text {
    font-size: 0.9em;
    color: #555;
    white-space: nowrap;

let currentSort = { gender: null, column: 'best', asc: false };

function calculateScores() {
  const n = parseInt(document.getElementById('racesToCount').value) || 4;
  runners.forEach(r => {
    const validScores = r.scores.filter(s => s !== null);
    validScores.sort((a, b) => b - a); // Sort descending to calculate best points
    r.total = validScores.reduce((sum, val) => sum + val, 0);
    r.bestN = validScores.slice(0, n).reduce((sum, val) => sum + val, 0);
  });
}

function renderTables() {
  calculateScores();
  const container = document.getElementById('tables-container');
  const n = parseInt(document.getElementById('racesToCount').value) || 4;
  const showTimes = document.getElementById('showTimes').checked;
  container.innerHTML = '';
  
  ['Men', 'Women'].forEach(gender => {
    let genderRunners = runners.filter(r => r.gender === gender);

    // Dynamic Sorting Logic
    if (currentSort.gender === gender || currentSort.gender === null) {
      genderRunners.sort((a, b) => {
        let valA, valB;
        if (currentSort.column === 'name') { valA = a.name; valB = b.name; }
        else if (currentSort.column === 'cat') { valA = a.cat || "ZZZ"; valB = b.cat || "ZZZ"; } // Blanks go to bottom
        else if (currentSort.column === 'total') { valA = a.total; valB = b.total; }
        else if (currentSort.column === 'best') { valA = a.bestN; valB = b.bestN; }
        else { // Sorting an individual race column index
          valA = a.scores[currentSort.column] || -1; 
          valB = b.scores[currentSort.column] || -1;
        }
        
        if (valA < valB) return currentSort.asc ? -1 : 1;
        if (valA > valB) return currentSort.asc ? 1 : -1;
        return 0;
      });
    }

    let html = '<h2>' + gender + '\'s Standings</h2><table class="lms-table">';
    html += '<tr>';
    html += '<th onclick="setSort(\'' + gender + '\', \'name\')">Name</th>';
    html += '<th onclick="setSort(\'' + gender + '\', \'cat\')">Age Cat.</th>';
    
    races.forEach((r, idx) => { 
      html += '<th onclick="setSort(\'' + gender + '\', ' + idx + ')">' + r + '</th>'; 
    });
    
    html += '<th onclick="setSort(\'' + gender + '\', \'total\')">Total<br>(All)</th>';
    html += '<th onclick="setSort(\'' + gender + '\', \'best\')" style="background-color:#d4d4e4;">Best ' + n + '</th>';
    html += '</tr>';

    genderRunners.forEach(r => {
      html += '<tr><td class="name-col">' + r.name + '</td><td>' + r.cat + '</td>';
      r.scores.forEach((s, idx) => {
        let cellContent = s !== null ? s : '';
        if (showTimes && s !== null && r.times[idx]) {
          cellContent += '<br><span class="time-text">(' + r.times[idx] + ')</span>';
        }
        html += '<td>' + cellContent + '</td>';
      });
      html += '<td>' + r.total + '</td><td class="highlight">' + r.bestN + '</td></tr>';
    });
    
    html += '</table>';
    container.innerHTML += html;
  });
}

function setSort(gender, col) {
  if (currentSort.gender === gender && currentSort.column === col) {
    currentSort.asc = !currentSort.asc; // Flip sort direction
  } else {
    currentSort.gender = gender;
    currentSort.column = col;
    currentSort.asc = (col === 'name' || col === 'cat'); // Names & Categories default to A-Z, Numbers default High-Low
  }
  renderTables();
}

// Initial Render
